<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TALEX | Secure Launch Access</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Orbitron:wght@800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            /* Deep Twilight Variables */
            --primary-indigo: #A78BFA;
            --primary-sky: #60A5FA;
            --primary-emerald: #34D399;
            
            --bg-dark: #0F172A;
            --bg-card: #1E293B;
            --glass-bg: rgba(30, 41, 59, 0.6);
            --glass-border: rgba(255, 255, 255, 0.1);
            
            --text-white: #F1F5F9;
            --text-gray: #94A3B8;
            --text-dim: #64748B;
            
            --gradient-primary: linear-gradient(135deg, var(--primary-indigo), var(--primary-sky));
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at top right, rgba(167, 139, 250, 0.1), transparent),
                        radial-gradient(circle at bottom left, rgba(96, 165, 250, 0.1), transparent);
        }

        .particle {
            position: absolute;
            background: var(--primary-indigo);
            border-radius: 50%;
            opacity: 0.1;
            filter: blur(1px);
            animation: drift var(--duration) linear infinite;
        }

        @keyframes drift {
            from { transform: translateY(100vh) translateX(0); }
            to { transform: translateY(-100px) translateX(var(--drift-x)); }
        }

        /* Auth Card */
        .auth-card {
            width: 100%;
            max-width: 450px;
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4), 
                        0 0 30px rgba(167, 139, 250, 0.05);
            position: relative;
            z-index: 10;
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .logo-container {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .logo-text {
            font-weight: 800;
            font-size: 2rem;
            color: var(--text-white);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 2rem;
            margin-bottom: 2.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            padding-bottom: 0.75rem;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-gray);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }

        .tab.active {
            color: var(--primary-indigo);
        }

        .tab.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--gradient-primary);
            box-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        /* Forms */
        .form-container {
            position: relative;
            height: 380px;
            overflow: hidden;
        }

        .auth-form {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            transition: var(--transition);
            opacity: 0;
            pointer-events: none;
            transform: translateX(20px);
        }

        .auth-form.active {
            opacity: 1;
            pointer-events: all;
            transform: translateX(0);
        }

        .auth-form.exit {
            transform: translateX(-20px);
            opacity: 0;
        }

        .input-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-group i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            width: 18px;
            height: 18px;
            transition: var(--transition);
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 0.8rem 1rem 0.8rem 3rem;
            color: var(--text-white);
            font-size: 1rem;
            transition: var(--transition);
        }

        input:focus {
            outline: none;
            border-color: var(--primary-indigo);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px rgba(167, 139, 250, 0.1);
        }

        input:focus + i {
            color: var(--primary-indigo);
        }

        .password-toggle {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-gray);
            transition: var(--transition);
        }

        .password-toggle:hover {
            color: var(--primary-indigo);
        }

        .form-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .forgot-link {
            text-decoration: none;
            color: var(--text-gray);
            transition: var(--transition);
            font-weight: 600;
        }

        .forgot-link:hover {
            color: var(--primary-indigo);
        }

        /* Buttons */
        .btn-launch {
            width: 100%;
            padding: 1rem;
            background: var(--gradient-primary);
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: 700;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(167, 139, 250, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-launch:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(167, 139, 250, 0.3);
            filter: brightness(1.1);
        }

        /* Validation */
        .input-error {
            border-color: #ff4757 !important;
            box-shadow: 0 0 15px rgba(255, 71, 87, 0.1) !important;
        }
        /* Responsive */
        @media (max-width: 480px) {
            .auth-card {
                padding: 2rem;
                margin: 1rem;
            }
            .logo-text { font-size: 1.5rem; }
            .form-container { height: 420px; }
        }
    </style>
</head>
<body class="dark-theme">
    <!-- Cursor Glow Effect -->
    <div id="cursor-glow"></div>

    <!-- High-End Educational Animation Background -->
    <div class="animated-bg">
        <div class="gradient-sphere sphere-1"></div>
        <div class="gradient-sphere sphere-2"></div>
        <div class="floating-icons">
            <!-- Icons injected via CSS -->
        </div>
        <div class="connection-lines"></div>
    </div>

    <div class="bg-container" id="bg-container">
        <!-- Particles added via JS -->
    </div>

    <div class="auth-card">
        <div class="logo-container">
            <div class="logo-text">
                <svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" style="width: 60px; height: 60px;">
                    <defs>
                        <linearGradient id="talexGradAuth" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#A78BFA" />
                            <stop offset="100%" style="stop-color:#60A5FA" />
                        </linearGradient>
                    </defs>
                    <path d="M100 110C100 110 85 140 75 160C70 170 80 180 90 175C100 170 110 150 110 150L130 175C140 185 155 175 150 160C140 140 120 120 120 120L150 80C160 70 145 60 135 70L110 100L95 40C90 30 75 35 80 45C85 55 100 110 100 110Z" fill="url(#talexGradAuth)" />
                    <circle cx="115" cy="85" r="12" fill="url(#talexGradAuth)" />
                    <path d="M105 80L115 75L125 80L115 85L105 80Z" fill="#2C3E50" />
                    <ellipse cx="85" cy="40" rx="25" ry="8" stroke="url(#talexGradAuth)" stroke-width="3" transform="rotate(-15 85 40)" />
                    <path d="M85 30L87 36H93L88 40L90 46L85 42L80 46L82 40L77 36H83L85 30Z" fill="#D4E157" />
                </svg>
                TALEX
            </div>
            <p style="font-size: 0.8rem; color: var(--primary-sky); letter-spacing: 2px; text-transform: uppercase; font-weight: 700;">Secure Network Access</p>
        </div>

        <div class="tabs">
            <div class="tab active" data-target="login">Login</div>
            <div class="tab" data-target="signup">Sign Up</div>
        </div>

        <div class="form-container">
            <!-- Login Form -->
            <form id="login-form" class="auth-form active">
                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text" placeholder="User Name" required id="login-username">
                </div>
                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" placeholder="Password" required id="login-password">
                    <i data-lucide="eye" class="password-toggle" onclick="togglePassword('login-password', this)"></i>
                </div>
                <div class="form-footer">
                    <label class="checkbox-group">
                        <input type="checkbox"> Remember me
                    </label>
                    <a href="#" class="forgot-link">Forgot password?</a>
                </div>
                <button type="submit" class="btn-launch">
                    Launch In <i data-lucide="arrow-right"></i>
                </button>
            </form>

            <!-- Signup Form -->
            <form id="signup-form" class="auth-form">
                <div class="input-group">
                    <i data-lucide="user"></i>
                    <input type="text" placeholder="Full Name" required id="signup-name">
                </div>
                <div class="input-group">
                    <i data-lucide="mail"></i>
                    <input type="email" placeholder="Email Address" required id="signup-email">
                </div>
                <div class="input-group">
                    <i data-lucide="lock"></i>
                    <input type="password" placeholder="Password" required id="signup-password">
                    <i data-lucide="eye" class="password-toggle" onclick="togglePassword('signup-password', this)"></i>
                </div>
                <div class="input-group">
                    <i data-lucide="shield-check"></i>
                    <input type="password" placeholder="Confirm Password" required id="signup-confirm">
                </div>
                <button type="submit" class="btn-launch">
                    Register <i data-lucide="user-plus"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        // Initialize Lucide Icons
        lucide.createIcons();

        // Background Particles
        const bgContainer = document.getElementById('bg-container');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            const size = Math.random() * 3 + 1 + 'px';
            particle.style.width = size;
            particle.style.height = size;
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.setProperty('--drift-x', (Math.random() * 200 - 100) + 'px');
            particle.style.setProperty('--duration', (Math.random() * 10 + 10) + 's');
            particle.style.animationDelay = Math.random() * 20 + 's';
            bgContainer.appendChild(particle);
        }

        // Tab Switching Logic
        const tabs = document.querySelectorAll('.tab');
        const loginForm = document.getElementById('login-form');
        const signupForm = document.getElementById('signup-form');

        tabs.forEach(tab => {
            tab.addEventListener('click', () => {
                if (tab.classList.contains('active')) return;

                tabs.forEach(t => t.classList.remove('active'));
                tab.classList.add('active');

                const target = tab.getAttribute('data-target');
                if (target === 'login') {
                    signupForm.classList.remove('active');
                    signupForm.classList.add('exit');
                    setTimeout(() => {
                        signupForm.classList.remove('exit');
                        loginForm.classList.add('active');
                    }, 400);
                } else {
                    loginForm.classList.remove('active');
                    loginForm.classList.add('exit');
                    setTimeout(() => {
                        loginForm.classList.remove('exit');
                        signupForm.classList.add('active');
                    }, 400);
                }
            });
        });

        // Password Toggle
        function togglePassword(id, icon) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }

        // Form Validation
        const forms = document.querySelectorAll('form');
        forms.forEach(form => {
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                let hasError = false;
                const inputs = form.querySelectorAll('input[required]');
                
                inputs.forEach(input => {
                    if (!input.value.trim()) {
                        input.classList.add('input-error');
                        hasError = true;
                    } else {
                        input.classList.remove('input-error');
                    }
                });

                // Confirm Password Check
                if (form.id === 'signup-form') {
                    const pass = document.getElementById('signup-password');
                    const confirm = document.getElementById('signup-confirm');
                    if (pass.value !== confirm.value) {
                        confirm.classList.add('input-error');
                        hasError = true;
                    }
                }

                if (!hasError) {
                    const btn = form.querySelector('.btn-launch');
                    const originalText = btn.innerHTML;
                    btn.innerHTML = 'Initiating Launch...';
                    btn.style.opacity = '0.7';
                    btn.disabled = true;

                    // Extract and save user name to localStorage
                    let userName = 'Rahul Sharma'; // Default fallback
                    if (form.id === 'signup-form') {
                        const nameInput = document.getElementById('signup-name');
                        if (nameInput && nameInput.value) {
                            userName = nameInput.value;
                        }
                    } else if (form.id === 'login-form') {
                        const usernameInput = document.getElementById('login-username');
                        if (usernameInput && usernameInput.value) {
                            userName = usernameInput.value;
                        }
                    }
                    localStorage.setItem('talex-user-name', userName);
                    
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                }
            });
        });
    </script>
</body>
</html>
